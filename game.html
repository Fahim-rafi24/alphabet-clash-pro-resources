<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Page</title>
    <!-- top fav-icon added -->
    <link rel="shortcut icon" href="images/game.png" type="image/x-icon">
    <!-- google-1st font family -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- google-2th font family -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
    <!------------------------------------------------------------------------------------------------->
    <!-- Flowbit link up -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.3.0/flowbite.min.css" rel="stylesheet" />
    <!-- desi ui link up -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.7.2/dist/full.min.css" rel="stylesheet" type="text/css" />
    <!-- tailwind css link up -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- css link up -->
    <link rel="stylesheet" href="css/secondary.css">
    <!-- head is close -->
</head>
<body  class="min-h-screen bg-[#010313] bg-[url('images/background.png')] bg-no-repeat bg-center">
    <main class="pt-32">
        <!-- screen -->
        <section>
            <div class="text-center border-8 rounded-3xl border-gray-600 h-[40vh] w-[60vw] m-auto">
                <div class="table">
                    <h2 class="text-center">Don't watch keyboard  while playing...</h2>
                </div>
                <h2 class="mt-36 text-8xl text-[#ffffff]">Y</h2>
            </div>
        </section>
        <!-- keybord -->
        <section>
            <div class="flex justify-center gap-1 my-1 w-full mt-14">
                <button><kbd class="kbd bg-[white] text-black hover:bg-purple-700 hover:text-white transition-transform transform hover:scale-110">q</kbd></button>
                <button><kbd class="kbd bg-[white] text-black hover:bg-purple-700 hover:text-white transition-transform transform hover:scale-110">w</kbd></button>
                <button><kbd class="kbd bg-[white] text-black hover:bg-purple-700 hover:text-white transition-transform transform hover:scale-110">e</kbd></button>
                <button><kbd class="kbd bg-[white] text-black hover:bg-purple-700 hover:text-white transition-transform transform hover:scale-110">r</kbd></button>
                <button><kbd class="kbd bg-[white] text-black hover:bg-purple-700 hover:text-white transition-transform transform hover:scale-110">t</kbd></button>
                <button><kbd class="kbd bg-[white] text-black hover:bg-purple-700 hover:text-white transition-transform transform hover:scale-110">y</kbd></button>
                <button><kbd class="kbd bg-[white] text-black hover:bg-purple-700 hover:text-white transition-transform transform hover:scale-110">u</kbd></button>
                <button><kbd class="kbd bg-[white] text-black hover:bg-purple-700 hover:text-white transition-transform transform hover:scale-110">i</kbd></button>
                <button><kbd class="kbd bg-[white] text-black hover:bg-purple-700 hover:text-white transition-transform transform hover:scale-110">o</kbd></button>
                <button><kbd class="kbd bg-[white] text-black hover:bg-purple-700 hover:text-white transition-transform transform hover:scale-110">p</kbd></button>
            </div> 
            <div class="flex justify-center gap-1 my-1 w-full">
                <button><kbd class="kbd bg-[white] text-black hover:bg-purple-700 hover:text-white transition-transform transform hover:scale-110">a</kbd></button>
                <button><kbd class="kbd bg-[white] text-black hover:bg-purple-700 hover:text-white transition-transform transform hover:scale-110">s</kbd></button>
                <button><kbd class="kbd bg-[white] text-black hover:bg-purple-700 hover:text-white transition-transform transform hover:scale-110">d</kbd></button>
                <button><kbd class="kbd bg-[white] text-black hover:bg-purple-700 hover:text-white transition-transform transform hover:scale-110">f</kbd></button>
                <button><kbd class="kbd bg-[white] text-black hover:bg-purple-700 hover:text-white transition-transform transform hover:scale-110">g</kbd></button>
                <button><kbd class="kbd bg-[white] text-black hover:bg-purple-700 hover:text-white transition-transform transform hover:scale-110">h</kbd></button>
                <button><kbd class="kbd bg-[white] text-black hover:bg-purple-700 hover:text-white transition-transform transform hover:scale-110">j</kbd></button>
                <button><kbd class="kbd bg-[white] text-black hover:bg-purple-700 hover:text-white transition-transform transform hover:scale-110">k</kbd></button>
                <button><kbd class="kbd bg-[white] text-black hover:bg-purple-700 hover:text-white transition-transform transform hover:scale-110">l</kbd></button>
            </div> 
            <div class="flex justify-center gap-1 my-1 w-full">
                <button><kbd class="kbd bg-[white] text-black hover:bg-purple-700 hover:text-white transition-transform transform hover:scale-110">z</kbd></button>
                <button><kbd class="kbd bg-[white] text-black hover:bg-purple-700 hover:text-white transition-transform transform hover:scale-110">x</kbd></button>
                <button><kbd class="kbd bg-[white] text-black hover:bg-purple-700 hover:text-white transition-transform transform hover:scale-110">c</kbd></button>
                <button><kbd class="kbd bg-[white] text-black hover:bg-purple-700 hover:text-white transition-transform transform hover:scale-110">v</kbd></button>
                <button><kbd class="kbd bg-[white] text-black hover:bg-purple-700 hover:text-white transition-transform transform hover:scale-110">b</kbd></button>
                <button><kbd class="kbd bg-[white] text-black hover:bg-purple-700 hover:text-white transition-transform transform hover:scale-110">n</kbd></button>
                <button><kbd class="kbd bg-[white] text-black hover:bg-purple-700 hover:text-white transition-transform transform hover:scale-110">m</kbd></button>
                <button><kbd class="kbd bg-[white] text-black hover:bg-purple-700 hover:text-white transition-transform transform hover:scale-110">/</kbd></button>
            </div>
        </section>
        <!-- Life & Score btn -->
        <section class="flex justify-around">
            <button class="btn">Life<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6">
                <path stroke-linecap="round" stroke-linejoin="round" d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12Z" />
            </svg> 1
            </button>
            <button class="btn">score<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v12m-3-2.818.879.659c1.171.879 3.07.879 4.242 0 1.172-.879 1.172-2.303 0-3.182C13.536 12.219 12.768 12 12 12c-.725 0-1.45-.22-2.003-.659-1.106-.879-1.106-2.303 0-3.182s2.9-.879 4.006 0l.415.33M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
            </svg>1
            </button>
        </section>
    </main>
</body>
</html>
